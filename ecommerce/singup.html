
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create an Account | Exclusive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
</head>
<body >

  <!-- Top Black Strip -->
  <div class="bg-black text-white text-center text-sm p-2">
    Summer Sale For All Swim Suits And Free Express Delivery - OFF 50%! <a href="#" class="underline ml-2">ShopNow</a>
    <span class="float-right mr-4 hidden md:inline">English ▼</span>
  </div>

  <!-- Navbar -->
  <nav class="flex items-center justify-between p-4 bg-white shadow">
    <div class="text-2xl font-bold">Exclusive</div>
    <div class="hidden md:flex space-x-8">
      <a href="#" class="text-gray-700 hover:text-blue-500">Home</a>
      <a href="#" class="text-gray-700 hover:text-blue-500">Contact</a>
      <a href="#" class="text-gray-700 hover:text-blue-500">About</a>
      <a href="#" class="text-gray-700 hover:text-blue-500 font-semibold">Sign Up</a>
    </div>
    <div class="hidden md:block">
      <input type="text" placeholder="What are you looking for?" class="border rounded-full py-2 px-4 w-64 focus:outline-none">
    </div>
  </nav>

  <!-- Main Section -->
  <div class="flex justify-center items-center min-h-screen p-8">
    <div class="flex w-[1305px] flex-col md:flex-row h-[px] bg-white rounded-lg overflow-hidden ">

      <!-- Left Image Side -->
      <div class="w-full md:w-1/2  flex items-center justify-center">
        <img src="img/Side Image.png" alt="Shopping Cart and Phone" class="object-contain h-full">
      </div>

      <!-- Right Form Side -->
      <div class=" w-full md:w-1/2 flex flex-col justify-center p-16">
        <h2 class="text-3xl font-bold mb-4 ">Create an account</h2>
        <p class="text-gray-600 mb-8">Enter your details below</p>
        
        <form class="space-y-6">
          <div>
            <input type="text" placeholder="Name" id="username" class="w-full border-b border-gray-400 focus:outline-none focus:border-black py-2">
          </div>
          <div>
            <input type="email" placeholder="Email or Phone Number"  required id="email" class="w-full border-b border-gray-400 focus:outline-none focus:border-black py-2">
          </div>
          <div>
            <input type="password" id="password" required placeholder="Password" class="w-full border-b border-gray-400 focus:outline-none focus:border-black py-2">
          </div>

          <div class="mt-6">
            <button type="submit" class="w-full bg-[#DB4444] hover:bg-red-600 text-white py-3 rounded" id="signup">Create Account</button>
          </div>

          <div class="mt-4">
            <button type="button" class="w-full flex items-center justify-center gap-4 border border-gray-400 py-3 rounded hover:bg-gray-100">
                <img src="img/Icon-Google.png" alt="Google Logo" class="w-5 h-5">
                Sign up with Google
              </button>
          </div>

          <p class="text-center text-gray-600 mt-6 text-sm">
            Already have an account? <a href="login.html" class="text-black font-semibold hover:underline">Log in</a>
          </p>
        </form>
      </div>

    </div>
  </div>
  <div class="text-center mt-4">
    <button onclick="reset()" class="bg-teal-950 text-white px-4 py-2 rounded hover:bg-teal-800">
      Reset LocalStorage
    </button>
  </div>
  
  
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script> 
<script src="app.js"></script>
</body>
</html>
